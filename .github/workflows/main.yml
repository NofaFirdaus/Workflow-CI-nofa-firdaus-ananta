name: Workflow CI - HOK Sentiment IndoBERT

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    environment: WORKFLOW-CI-ML
    timeout-minutes: 1440

    steps:
      - name: Test Internet to Hugging Face
        run: |
          curl -I https://huggingface.co

      - name: Check Environment Secrets
        env:
          DAGSHUB_USERNAME:   ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:      ${{ secrets.DAGSHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "Checking secrets..."
          [ -n "$DAGSHUB_USERNAME" ]   && echo "DAGSHUB_USERNAME OK"   || echo "DAGSHUB_USERNAME EMPTY"
          [ -n "$DAGSHUB_TOKEN" ]      && echo "DAGSHUB_TOKEN OK"      || echo "DAGSHUB_TOKEN EMPTY"
          [ -n "$DOCKERHUB_USERNAME" ] && echo "DOCKERHUB_USERNAME OK" || echo "DOCKERHUB_USERNAME EMPTY"
          [ -n "$DOCKERHUB_TOKEN" ]    && echo "DOCKERHUB_TOKEN OK"    || echo "DOCKERHUB_TOKEN EMPTY"

      # --------------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------------
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # --------------------------------------------------------
      # 2. Setup Miniconda (harus sebelum install dependencies)
      # --------------------------------------------------------
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: mlflow-env
          python-version: "3.10"

      - name: Verify Conda
        shell: bash -l {0}
        run: |
          conda --version
          conda info
          which conda

      # --------------------------------------------------------
      # 3. Setup Python
      # --------------------------------------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # --------------------------------------------------------
      # 4. Check Env
      # --------------------------------------------------------
      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          ls -la MLProject/

      # --------------------------------------------------------
      # 5. Install dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.13.0 dagshub==0.3.26

      # --------------------------------------------------------
      # 6. Run MLflow Project
      # --------------------------------------------------------
      - name: Run mlflow project
        shell: bash -l {0}
        env:
          DAGSHUB_USERNAME:         ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:            ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          HF_HUB_DOWNLOAD_TIMEOUT:  "1440"
          TRANSFORMERS_OFFLINE:     "0"
        run: |
          mlflow run MLProject/ \
            -P learning_rate=2e-5 \
            -P batch_size=8 \
            -P epochs=1 \
            -P max_len=128 \
            --env-manager=conda

      # --------------------------------------------------------
      # 7. Get latest MLflow run_id
      # --------------------------------------------------------
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

